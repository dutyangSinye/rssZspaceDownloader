services:
  rss-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rss-downloader
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      TZ: Asia/Shanghai
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
